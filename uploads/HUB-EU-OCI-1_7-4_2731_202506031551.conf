end
config system interface
    edit "port1"
        set vdom "root"
        set mode dhcp
        set allowaccess ping https ssh http
        set type physical
        set alias "mgnt"
        set snmp-index 1
        set mtu-override enable
        set mtu 9000
    next
    edit "port2"
        set vdom "root"
        set ip 10.220.0.3 255.255.255.224
        set allowaccess ping https
        set type physical
        set alias "public"
        set lldp-reception enable
        set role wan
        set snmp-index 6
        set secondary-IP enable
        set mtu-override enable
        set mtu 9000
        config secondaryip
            edit 1
                set ip 10.220.0.4 255.255.255.224
                set allowaccess ping
            next
        end
    next
    edit "port3"
        set vdom "root"
        set ip 10.220.0.35 255.255.255.224
        set allowaccess ping https ssh radius-acct
        set type physical
        set alias "trust"
        set device-identification enable
        set lldp-transmission enable
        set role lan
        set snmp-index 7
        set secondary-IP enable
        set mtu-override enable
        set mtu 9000
        config secondaryip
            edit 1
                set ip 10.220.0.36 255.255.255.224
                set allowaccess ping ssh
            next
        end
    next
    edit "port4"
        set vdom "root"
        set ip 10.220.0.99 255.255.255.224
        set allowaccess ping
        set type physical
        set alias "hasync"
        set snmp-index 8
        set mtu-override enable
        set mtu 9000
    next
    edit "naf.root"
        set vdom "root"
        set type tunnel
        set src-check disable
        set snmp-index 2
    next
    edit "l2t.root"
        set vdom "root"
        set type tunnel
        set snmp-index 3
    next
    edit "ssl.root"
        set vdom "root"
        set type tunnel
        set alias "SSL VPN interface"
        set snmp-index 4
    next
    edit "fortilink"
        set vdom "root"
        set fortilink enable
        set ip 10.255.1.1 255.255.255.0
        set allowaccess ping fabric
        set type aggregate
        set lldp-reception enable
        set lldp-transmission enable
        set snmp-index 5
    next
    edit "VPN_ESFWHQ_1"
        set vdom "root"
        set type tunnel
        set snmp-index 9
        set interface "port2"
    next
    edit "VPN_AZURE_EU_1"
        set vdom "root"
        set type tunnel
        set snmp-index 10
        set interface "port2"
    next
end
